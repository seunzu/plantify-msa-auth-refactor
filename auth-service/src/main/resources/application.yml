spring:
  application:
    name: auth
  datasource:
    url: ${AUTH_DATASOURCE_URL:jdbc:h2:mem:auth;MODE=MySQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1}
    username: ${AUTH_DATASOURCE_USERNAME:sa}
    password: ${AUTH_DATASOURCE_PASSWORD:}
    driver-class-name: ${AUTH_DATASOURCE_DRIVER:org.h2.Driver}
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    show-sql: false
    hibernate:
      ddl-auto: create-drop
      naming:
        physical-strategy: org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

oauth:
  kakao:
    client-id: ${KAKAO_CLIENT_ID:local-client-id}
    client-secret: ${KAKAO_CLIENT_SECRET:local-client-secret}
jwt:
  access-token-expiration: ${JWT_ACCESS_TOKEN_EXPIRATION:300000}
  refresh-token-expiration: ${JWT_REFRESH_TOKEN_EXPIRATION:86400000}
  key-id: ${JWT_KEY_ID:plantify-local-rsa-key-1}
  private-key: ${JWT_PRIVATE_KEY:classpath:keys/private-key.pem}
  public-key: ${JWT_PUBLIC_KEY:classpath:keys/public-key.pem}

client:
  base:
    url: ${CLIENT_BASE_URL:http://localhost:3000}
  pay:
    url: ${CLIENT_PAY_URL:http://localhost:3001}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true
