spring:
  application:
    name: auth
  datasource:
    url: ${AUTH_DATASOURCE_URL:jdbc:h2:mem:auth;MODE=MySQL;DATABASE_TO_LOWER=TRUE;NON_KEYWORDS=USER;DB_CLOSE_DELAY=-1}
    username: ${AUTH_DATASOURCE_USERNAME:sa}
    password: ${AUTH_DATASOURCE_PASSWORD:}
    driver-class-name: ${AUTH_DATASOURCE_DRIVER:org.h2.Driver}
  jpa:
    database-platform: ${AUTH_DATABASE_PLATFORM:org.hibernate.dialect.H2Dialect}
    show-sql: false
    hibernate:
      ddl-auto: ${AUTH_DDL_AUTO:create-drop}
      naming:
        physical-strategy: org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

oauth:
  kakao:
    client-id: ${KAKAO_CLIENT_ID:local-client-id}
    client-secret: ${KAKAO_CLIENT_SECRET:local-client-secret}
jwt:
  secret: ${JWT_SECRET:local-baseline-secret-key-for-hs256}
  access-token-expiration: ${JWT_ACCESS_TOKEN_EXPIRATION:300000}
  refresh-token-expiration: ${JWT_REFRESH_TOKEN_EXPIRATION:86400000}

client:
  base:
    url: ${CLIENT_BASE_URL:http://localhost:3000}
  pay:
    url: ${CLIENT_PAY_URL:http://localhost:3001}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true
