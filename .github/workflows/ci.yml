name: CI

on:
  push:
    branches: ["main", "refactor/**"]
  pull_request:
    branches: ["main"]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - common-auth-lib
          - auth-service
          - demo-resource-service
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Set Gradle permissions
        if: matrix.service == 'auth-service'
        run: chmod +x gradlew
        working-directory: auth-service

      - name: Test
        run: ${{ matrix.service == 'auth-service' && './gradlew test' || '../auth-service/gradlew test' }}
        working-directory: ${{ matrix.service }}

  docker-build:
    runs-on: ubuntu-latest
    needs: build-and-test
    strategy:
      fail-fast: false
      matrix:
        service:
          - auth-service
          - demo-resource-service
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build jar
        run: ${{ matrix.service == 'auth-service' && 'chmod +x gradlew && ./gradlew bootJar' || '../auth-service/gradlew bootJar' }}
        working-directory: ${{ matrix.service }}

      - name: Build auth Docker image
        if: matrix.service == 'auth-service'
        run: docker build -t plantify/${{ matrix.service }}:ci .
        working-directory: auth-service

      - name: Build demo Docker image
        if: matrix.service == 'demo-resource-service'
        run: docker build -f demo-resource-service/Dockerfile -t plantify/${{ matrix.service }}:ci .
