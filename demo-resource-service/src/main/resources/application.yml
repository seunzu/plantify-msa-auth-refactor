server:
  port: ${SERVER_PORT:8082}

spring:
  application:
    name: demo-resource-service

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true

auth:
  jwk-set-uri: ${AUTH_JWK_SET_URI:http://localhost:8081/.well-known/jwks.json}
  permit-all:
    - /actuator/**
    - /health
